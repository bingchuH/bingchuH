<svg width="100%" height="auto" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile signal cards">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.68"/>
    </linearGradient>
    <linearGradient id="edge" x1="100" y1="45" x2="1100" y2="255" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A5B4FC" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0.48"/>
    </linearGradient>
    <filter id="shadow" x="70" y="20" width="1060" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="100" y="45" width="1000" height="210" rx="34" fill="url(#card)"/>
    <rect x="100.75" y="45.75" width="998.5" height="208.5" rx="33.25" stroke="url(#edge)" stroke-width="1.5"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="150" y="105" font-size="15" font-weight="800" letter-spacing="4" fill="#64748B">PROFILE SIGNAL</text>
    <text x="150" y="151" font-size="30" font-weight="800" fill="#0F172A">AI product manager with statistics and engineering depth</text>
    <text x="150" y="190" font-size="18" fill="#475569">Statistics undergraduate · Computer science graduate · Based in Shanghai</text>
    <g font-size="14" font-weight="700" fill="#334155">
      <rect x="150" y="212" width="125" height="32" rx="16" fill="#EEF2FF"/>
      <text x="212" y="233" text-anchor="middle">AI Strategy</text>
      <rect x="290" y="212" width="120" height="32" rx="16" fill="#ECFEFF"/>
      <text x="350" y="233" text-anchor="middle">RAG / Agent</text>
      <rect x="425" y="212" width="132" height="32" rx="16" fill="#F0FDFA"/>
      <text x="491" y="233" text-anchor="middle">Product Data</text>
      <rect x="572" y="212" width="150" height="32" rx="16" fill="#FAF5FF"/>
      <text x="647" y="233" text-anchor="middle">Enterprise AI</text>
    </g>
    <g opacity="0.94">
      <rect x="830" y="90" width="190" height="120" rx="26" fill="#FFFFFF" fill-opacity="0.72" stroke="#FFFFFF"/>
      <circle cx="878" cy="140" r="23" fill="#60A5FA" fill-opacity="0.34"/>
      <circle cx="920" cy="140" r="23" fill="#A78BFA" fill-opacity="0.3"/>
      <circle cx="962" cy="140" r="23" fill="#2DD4BF" fill-opacity="0.32"/>
      <text x="925" y="190" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3" fill="#64748B">TASTEFUL · CLEAR</text>
    </g>
  </g>
</svg>
