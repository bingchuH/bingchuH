<svg width="100%" height="auto" viewBox="0 0 1200 840" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Product focus">
  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="1200" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.45" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 190) rotate(35) scale(420 260)">
      <stop stop-color="#A78BFA" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 610) rotate(140) scale(430 280)">
      <stop stop-color="#2DD4BF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="92" y1="42" x2="1108" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.76"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.46"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="500" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.66"/>
    </linearGradient>
    <filter id="shadowPanel" x="48" y="6" width="1104" height="814" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
    <filter id="shadowCard" x="-24" y="-20" width="568" height="364" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#64748B" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="840" rx="42" fill="url(#stage)"/>
  <rect width="1200" height="840" rx="42" fill="url(#glowA)"/>
  <rect width="1200" height="840" rx="42" fill="url(#glowB)"/>
  <g opacity="0.35">
    <path d="M88 210C250 116 365 280 526 192C698 98 802 142 948 238C1027 290 1083 260 1138 224" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M66 710C224 598 382 754 552 644C724 532 816 502 984 604C1064 652 1100 628 1150 586" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <g filter="url(#shadowPanel)">
    <rect x="92" y="46" width="1016" height="748" rx="40" fill="url(#panel)"/>
    <rect x="92.75" y="46.75" width="1014.5" height="746.5" rx="39.25" stroke="#FFFFFF" stroke-opacity="0.88" stroke-width="1.5"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="140" y="116" font-size="15" font-weight="800" letter-spacing="4" fill="#64748B">PRODUCT FOCUS</text>
    <text x="140" y="162" font-size="36" font-weight="800" fill="#0F172A">Where product judgment meets model capability</text>
    <text x="140" y="198" font-size="18" fill="#475569">Four working surfaces for building AI products with clarity, evaluation, and real adoption.</text>

    <g transform="translate(120 250)">
      <g filter="url(#shadowCard)">
        <rect x="0" y="0" width="460" height="235" rx="30" fill="url(#card)"/>
        <rect x="0.75" y="0.75" width="458.5" height="233.5" rx="29.25" stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="1.5"/>
      </g>
      <circle cx="398" cy="48" r="72" fill="#A78BFA" fill-opacity="0.18"/>
      <text x="36" y="54" font-size="13" font-weight="800" letter-spacing="3" fill="#64748B">01 · PRODUCT STRATEGY</text>
      <text x="36" y="95" font-size="27" font-weight="800" fill="#0F172A">AI Product Strategy</text>
      <text x="36" y="132" font-size="16" fill="#475569">Translate emerging model capabilities into clear</text>
      <text x="36" y="157" font-size="16" fill="#475569">scenarios, sharp requirements, measurable MVPs,</text>
      <text x="36" y="182" font-size="16" fill="#475569">and product decisions that compound over time.</text>
      <rect x="36" y="202" width="74" height="30" rx="15" fill="#EEF2FF"/>
      <text x="73" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">MVP</text>
      <rect x="122" y="202" width="86" height="30" rx="15" fill="#ECFEFF"/>
      <text x="165" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Metrics</text>
      <rect x="220" y="202" width="92" height="30" rx="15" fill="#F5F3FF"/>
      <text x="266" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Roadmap</text>
    </g>

    <g transform="translate(620 250)">
      <g filter="url(#shadowCard)">
        <rect x="0" y="0" width="460" height="235" rx="30" fill="url(#card)"/>
        <rect x="0.75" y="0.75" width="458.5" height="233.5" rx="29.25" stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="1.5"/>
      </g>
      <circle cx="398" cy="48" r="72" fill="#60A5FA" fill-opacity="0.18"/>
      <text x="36" y="54" font-size="13" font-weight="800" letter-spacing="3" fill="#64748B">02 · LLM EXPERIENCE</text>
      <text x="36" y="95" font-size="27" font-weight="800" fill="#0F172A">LLM Application Design</text>
      <text x="36" y="132" font-size="16" fill="#475569">Design AI experiences beyond demos: RAG, agent</text>
      <text x="36" y="157" font-size="16" fill="#475569">workflows, evaluation, fallback strategy, and user</text>
      <text x="36" y="182" font-size="16" fill="#475569">trust in production contexts.</text>
      <rect x="36" y="202" width="70" height="30" rx="15" fill="#ECFEFF"/>
      <text x="71" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">RAG</text>
      <rect x="118" y="202" width="78" height="30" rx="15" fill="#EFF6FF"/>
      <text x="157" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Agent</text>
      <rect x="208" y="202" width="70" height="30" rx="15" fill="#F0FDFA"/>
      <text x="243" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Eval</text>
    </g>

    <g transform="translate(120 525)">
      <g filter="url(#shadowCard)">
        <rect x="0" y="0" width="460" height="235" rx="30" fill="url(#card)"/>
        <rect x="0.75" y="0.75" width="458.5" height="233.5" rx="29.25" stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="1.5"/>
      </g>
      <circle cx="398" cy="48" r="72" fill="#2DD4BF" fill-opacity="0.18"/>
      <text x="36" y="54" font-size="13" font-weight="800" letter-spacing="3" fill="#64748B">03 · PRODUCT ANALYTICS</text>
      <text x="36" y="95" font-size="27" font-weight="800" fill="#0F172A">Data-driven Product Analysis</text>
      <text x="36" y="132" font-size="16" fill="#475569">Use statistics, hypotheses, experiments, funnels,</text>
      <text x="36" y="157" font-size="16" fill="#475569">segmentation, and uncertainty thinking to make</text>
      <text x="36" y="182" font-size="16" fill="#475569">product judgment more rigorous.</text>
      <rect x="36" y="202" width="90" height="30" rx="15" fill="#F0FDFA"/>
      <text x="81" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">A/B Test</text>
      <rect x="138" y="202" width="66" height="30" rx="15" fill="#EFF6FF"/>
      <text x="171" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">SQL</text>
      <rect x="216" y="202" width="78" height="30" rx="15" fill="#EEF2FF"/>
      <text x="255" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Cohort</text>
    </g>

    <g transform="translate(620 525)">
      <g filter="url(#shadowCard)">
        <rect x="0" y="0" width="460" height="235" rx="30" fill="url(#card)"/>
        <rect x="0.75" y="0.75" width="458.5" height="233.5" rx="29.25" stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="1.5"/>
      </g>
      <circle cx="398" cy="48" r="72" fill="#F472B6" fill-opacity="0.16"/>
      <text x="36" y="54" font-size="13" font-weight="800" letter-spacing="3" fill="#64748B">04 · WORKFLOW AI</text>
      <text x="36" y="95" font-size="27" font-weight="800" fill="#0F172A">AI + Enterprise Workflow</text>
      <text x="36" y="132" font-size="16" fill="#475569">Make AI useful inside real business processes:</text>
      <text x="36" y="157" font-size="16" fill="#475569">knowledge management, workflow automation,</text>
      <text x="36" y="182" font-size="16" fill="#475569">customer service, and decision support.</text>
      <rect x="36" y="202" width="70" height="30" rx="15" fill="#F5F3FF"/>
      <text x="71" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">SaaS</text>
      <rect x="118" y="202" width="96" height="30" rx="15" fill="#FFF7ED"/>
      <text x="166" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Workflow</text>
      <rect x="226" y="202" width="66" height="30" rx="15" fill="#ECFEFF"/>
      <text x="259" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">KM</text>
    </g>
  </g>
</svg>
